name: "Stale Bot"

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity for 30 days. It will be closed in 7 days if no further activity occurs.'
          close-issue-message: 'This issue was closed because it has been stalled for 7 days with no activity after being marked as stale.'
          exempt-issue-labels: 'pinned,security,in-progress'
          days-before-pr-stale: -1
          days-before-pr-close: -1
